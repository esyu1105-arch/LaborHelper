<!DOCTYPE html>
<html lang="zh-HK">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream:   #fdf6f0;
            --blush:   #f9e8ea;
            --rose-lt: #f2c4cc;
            --rose:    #c4728a;
            --rose-dk: #9c3a5a;
            --gold:    #c9963a;
            --gold-lt: #fdf0dc;
            --gold-bd: #e8c980;
        }
        body {
            font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
            background-color: var(--cream);
            background-image:
                radial-gradient(ellipse at 10% 0%, #fce7ed44 0%, transparent 50%),
                radial-gradient(ellipse at 90% 100%, #fce7ed22 0%, transparent 50%);
        }
        .font-display { font-family: 'Cormorant Garamond', Georgia, serif; }
        .custom-scrollbar::-webkit-scrollbar { height: 3px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--rose-lt); border-radius: 99px; }
        .task-card { transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
        .task-active {
            border-color: var(--rose) !important;
            background-color: #fdf0f3 !important;
            box-shadow: 0 8px 24px -4px rgba(156,58,90,0.12);
            transform: scale(1.012);
        }
        .task-urgent {
            border-color: var(--gold-bd) !important;
            background: linear-gradient(135deg, var(--gold-lt) 0%, #fff9f0 100%) !important;
        }
        .task-active.task-urgent {
            border-color: var(--gold) !important;
            box-shadow: 0 8px 24px -4px rgba(201,150,58,0.18);
        }
        #time-progress-bar {
            background: linear-gradient(90deg, #c4728a, #f2a0b4, #c9963a);
            background-size: 200% 100%;
            animation: shimmer 3s ease infinite;
        }
        @keyframes shimmer {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .day-divider {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .day-divider::before,
        .day-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--rose-lt), transparent);
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen pb-20">

    <!-- Header -->

                <button onclick="switchCrew('chun')"    id="crew-chun"    class="crew-btn shrink-0 px-3.5 py-2 text-xs font-bold rounded-xl border snap-start transition-all">春雨</button>

            </div>

        </div>

        <!-- Timeline -->

                    </p>
                </div>
            </div>
        </div>

    </main>

                {date:"2026-05-24",start:"20:30",end:"21:30",title:"入座任務完成：準備入席",desc:"入座安排及迎賓任務完美結束，可以入席享用晚宴。"},
                {date:"2026-05-24",start:"21:30",end:"22:45",title:"敬酒環節 Standby",desc:"敬酒環節前於席邊 Ready 支援。"},
                {date:"2026-05-24",start:"22:45",end:"23:15",title:"送客分流引導",desc:"送客開始，手持指示牌在現場提供指示，引導賓客離場並指引前往接駁巴士位置。"},
                {date:"2026-05-24",start:"23:15",end:"23:30",title:"全員撤退：協助物資上花車",desc:"作為 Gentlemen 組的核心，協助清點並將現場剩餘物資全部搬到花車上。"}
            ]
        }
    };

    const START_TIME = new Date("2026-05-23T21:00:00+08:00").getTime();
    const END_TIME   = new Date("2026-05-24T23:30:00+08:00").getTime();

    const CREW_COLORS = {
        rose:   { active:"bg-rose-600 text-white border-rose-600",   inactive:"bg-white text-slate-600 border-slate-200 hover:bg-rose-50 hover:border-rose-200 hover:text-rose-700" },
        indigo: { active:"bg-indigo-600 text-white border-indigo-600", inactive:"bg-white text-slate-600 border-slate-200 hover:bg-indigo-50 hover:border-indigo-200 hover:text-indigo-700" }
    };
    const PROFILE_COLORS = {
        rose:   { badge:"bg-rose-50 text-rose-700 border-rose-200",   icon:"bg-rose-50 border-rose-100 text-rose-400",    card:"border-rose-100" },
        indigo: { badge:"bg-indigo-50 text-indigo-700 border-indigo-200", icon:"bg-indigo-50 border-indigo-100 text-indigo-400", card:"border-indigo-100" }
    };

    let currentCrew = localStorage.getItem('last_active_crew') || 'chun';
    let debugTimeOffset = 0, isDebugMode = false;

    const timeFormatter = new Intl.DateTimeFormat('en-US', {
        timeZone:'Asia/Hong_Kong', hour12:false,
        hour:'2-digit', minute:'2-digit', second:'2-digit'
    });
    const dateFormatter = new Intl.DateTimeFormat('zh-HK', {
        timeZone:'Asia/Hong_Kong', month:'long', day:'numeric', weekday:'short'
    });

    function parseTaskTime(dateStr, timeStr) {
        return new Date(`${dateStr}T${timeStr}:00+08:00`).getTime();
    }

    window.switchCrew = function(key) {
        currentCrew = key;
        localStorage.setItem('last_active_crew', key);
        const data = CREW_DATA[key];
        const cc   = CREW_COLORS[data.color];
        const pc   = PROFILE_COLORS[data.color];

        document.querySelectorAll('.crew-btn').forEach(btn => {
            const k = btn.id.replace('crew-','');
            const c = CREW_COLORS[CREW_DATA[k].color];
            btn.className = `crew-btn shrink-0 px-3.5 py-2 text-xs font-bold rounded-xl border snap-start transition-all ${c.inactive}`;
        });
        const ab = document.getElementById(`crew-${key}`);
        if (ab) ab.className = `crew-btn shrink-0 px-3.5 py-2 text-xs font-bold rounded-xl border snap-start transition-all ${cc.active}`;

        document.getElementById('profile-name').textContent  = data.name;
        document.getElementById('profile-title').textContent = data.title;
        const badge = document.getElementById('profile-badge');
        badge.textContent = data.role;
        badge.className   = `text-[10px] font-black px-2.5 py-0.5 rounded-full border shrink-0 ${pc.badge}`;
        document.getElementById('profile-icon').className    = `fa-solid ${data.icon} text-sm`;
        document.getElementById('profile-icon-wrap').className = `rounded-xl p-2.5 border shrink-0 ${pc.icon}`;
        document.getElementById('crew-profile').className   = `bg-white rounded-2xl px-4 py-3 border shadow-sm flex items-center gap-3 ${pc.card}`;

        renderTimeline();
        tick();
    };

    function renderTimeline() {
        const container = document.getElementById('timeline-container');
        container.innerHTML = '';
        const data = CREW_DATA[currentCrew];
        let lastDate = '';

        data.timeline.forEach((task, idx) => {
            if (task.date !== lastDate) {
                const label = task.date === '2026-05-23'
                    ? '🌙 5月23日 · 星期六 · 前哨夜'
                    : '💍 5月24日 · 星期日 · 大婚正日';
                container.insertAdjacentHTML('beforeend', `
                    <div class="day-divider py-1 ${idx===0?'':'mt-2'}">
                        <span class="font-display italic text-[11px] font-semibold text-rose-400 whitespace-nowrap tracking-wide">${label}</span>
                    </div>`);
                lastDate = task.date;
            }

            const tagEl = task.tag
                ? `<span class="text-[10px] bg-rose-50 text-rose-600 px-2 py-0.5 rounded-full font-semibold border border-rose-100 leading-none">${task.tag}</span>`
                : '';
            const urgentEl = task.urgent
                ? `<span class="text-[10px] bg-amber-50 text-amber-700 px-2 py-0.5 rounded-full font-bold border border-amber-200 leading-none">⚡ 關鍵</span>`
                : '';
            const matEl = task.materials
                ? `<div class="mt-2 bg-amber-50 border border-amber-100 rounded-lg px-2.5 py-1.5 flex items-start gap-1.5">
                       <i class="fa-solid fa-briefcase text-amber-500 text-[9px] mt-0.5 shrink-0"></i>
                       <span class="text-[10px] text-amber-700 font-semibold leading-snug">備料：${task.materials}</span>
                   </div>`
                : '';

            // Fix: always show full start–end time range
            const timeRange = `${task.start} – ${task.end}`;
            const urgentCard = task.urgent ? 'task-urgent' : '';

            container.insertAdjacentHTML('beforeend', `
                <div class="task-card bg-white rounded-xl p-3.5 shadow-sm border border-slate-100 ${urgentCard} relative"
                     data-date="${task.date}" data-start="${task.start}" data-end="${task.end}" id="task-idx-${idx}">
                    <div class="absolute -left-[1.45rem] top-4 w-3 h-px bg-rose-100"></div>
                    <div class="flex items-start gap-2">
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start gap-2 flex-wrap">
                                <span class="task-title font-bold text-sm text-slate-800 leading-snug">${task.title}</span>
                                <span class="time-badge shrink-0 text-[10px] font-bold px-2 py-0.5 rounded-md bg-slate-100 text-slate-500 transition-colors tabular-nums">${timeRange}</span>
                            </div>
                            <p class="text-xs text-slate-500 mt-1 leading-relaxed">${task.desc}</p>
                            ${(tagEl||urgentEl) ? `<div class="mt-2 flex flex-wrap gap-1">${tagEl}${urgentEl}</div>` : ''}
                            ${matEl}
                        </div>
                    </div>
                </div>`);
        });
    }

    function tick() {
        const now = Date.now() + debugTimeOffset;
        const nowDate = new Date(now);

        if (isDebugMode) {
            document.getElementById('live-clock').innerHTML = `<span style="color:#c4728a">${timeFormatter.format(nowDate)}</span>`;
            document.getElementById('clock-label').textContent = `模擬時間 · ${dateFormatter.format(nowDate)}`;
        } else {
            document.getElementById('live-clock').textContent = timeFormatter.format(nowDate);
            document.getElementById('clock-label').textContent = `當前香港時間 · ${dateFormatter.format(nowDate)}`;
        }

        let pct = 0;
        if (now >= END_TIME) pct = 100;
        else if (now > START_TIME) pct = ((now - START_TIME) / (END_TIME - START_TIME)) * 100;
        document.getElementById('progress-percentage').textContent = `${Math.floor(pct)}%`;
        document.getElementById('time-progress-bar').style.width = `${pct}%`;

        let activeFound = false, activeName = '';
        document.querySelectorAll('.task-card').forEach(card => {
            const start    = parseTaskTime(card.dataset.date, card.dataset.start);
            const end      = parseTaskTime(card.dataset.date, card.dataset.end);
            const isUrgent = card.classList.contains('task-urgent');
            const badge    = card.querySelector('.time-badge');

            card.classList.remove('task-active');
            badge.classList.remove('bg-rose-500','bg-amber-500','text-white');
            badge.classList.add('bg-slate-100','text-slate-500');

            if (now >= start && now < end) {
                card.classList.add('task-active');
                badge.classList.remove('bg-slate-100','text-slate-500');
                badge.classList.add(isUrgent ? 'bg-amber-500' : 'bg-rose-500', 'text-white');
                activeFound = true;
                activeName  = card.querySelector('.task-title').textContent;
            }
        });

        const dot = document.getElementById('active-dot');
        const ping = document.getElementById('active-ping');
        const status = document.getElementById('current-task-status');

        if (now < START_TIME) {
            dot.className    = 'relative inline-flex rounded-full h-2.5 w-2.5 bg-slate-300';
            ping.classList.add('hidden');
            status.textContent = '等待大日子降臨...';
            status.className   = 'text-[11px] font-bold text-slate-400 truncate text-right';
        } else if (now >= END_TIME) {
            dot.className    = 'relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500';
            ping.classList.add('hidden');
            status.textContent = '🎉 今日作戰順利，辛苦晒！';
            status.className   = 'text-[11px] font-bold text-emerald-600 truncate text-right';
        } else if (activeFound) {
            dot.className    = 'relative inline-flex rounded-full h-2.5 w-2.5 bg-rose-500';
            ping.className   = 'animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75';
            ping.classList.remove('hidden');
            status.textContent = activeName;
            status.className   = 'text-[11px] font-black text-rose-600 truncate text-right';
        } else {
            dot.className    = 'relative inline-flex rounded-full h-2.5 w-2.5 bg-sky-400';
            ping.classList.add('hidden');
            status.textContent = '緩衝 / 待命中';
            status.className   = 'text-[11px] font-bold text-sky-600 truncate text-right';
        }
    }

    // Triple-click title = debug time simulator
    let clickCount = 0, clickTimer;
    document.getElementById('app-title').addEventListener('click', () => {
        clickCount++;
        clearTimeout(clickTimer);
        clickTimer = setTimeout(() => { clickCount = 0; }, 1000);
        if (clickCount === 3) {
            clickCount = 0;
            const input = prompt('【除錯模式】輸入模擬日期時間\n格式：MM-DD HH:MM（例：05-24 18:30）\n留空或取消即恢復真實時間：', '05-24 17:30');
            if (input && input.includes(' ') && input.includes(':')) {
                const [dp, tp] = input.split(' ');
                debugTimeOffset = parseTaskTime(`2026-${dp}`, tp) - Date.now();
                isDebugMode = true;
                tick();
                alert(`已模擬至 2026-${dp} ${tp} HKT`);
            } else {
                debugTimeOffset = 0; isDebugMode = false;
                tick(); alert('已恢復真實時間。');
            }
        }
    });

    window.addEventListener('DOMContentLoaded', () => {
        switchCrew(currentCrew);
        setInterval(tick, 1000);
    });
    </script>
</body>
</html>

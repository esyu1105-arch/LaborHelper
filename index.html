            // Toggle Button Styling
            document.querySelectorAll('.crew-btn').forEach(btn => {
                btn.className = "crew-btn shrink-0 px-4 py-2.5 text-xs font-black rounded-xl transition-all snap-start shadow-sm border bg-white text-slate-600 border-slate-200 hover:bg-slate-50";
            });
            
            const activeBtn = document.getElementById(`crew-${crewKey}`);
            if (activeBtn) {
                // Keep the premium Rose Theme as the primary color for the active status
                activeBtn.className = "crew-btn shrink-0 px-4 py-2.5 text-xs font-black rounded-xl transition-all snap-start shadow-sm border bg-rose-600 text-white border-rose-600";
            }

            renderTimeline();
            tick(); // Instant update
        }

        // Dynamic HTML Timeline Card Builder
        function renderTimeline() {
            const container = document.getElementById('timeline-container');
            container.innerHTML = "";
            
            const data = CREW_DATA[currentCrew];
            
            // Render May 23 tasks first, then May 24 tasks
            let lastDate = "";
            
            data.timeline.forEach((task, idx) => {
                const isUrgent = task.urgent;
                const tagEl = task.tag ? `<span class="text-[10px] bg-rose-50 text-rose-700 px-2 py-0.5 rounded-full font-bold border border-rose-100">${task.tag}</span>` : '';
                const matEl = task.materials ? `
                    <div class="mt-2 bg-red-50 border border-red-100 rounded-lg p-2 flex items-start gap-1.5">
                        <i class="fa-solid fa-toolbox text-red-500 text-[10px] mt-0.5"></i>
                        <span class="text-[10px] text-red-700 font-bold leading-none">攜帶/備忘：${task.materials}</span>
                    </div>
                ` : '';
                
                let timeRange = task.start;
                if (task.end && task.start !== task.end) {
                    const durationMins = (parseTaskTime(task.date, task.end) - parseTaskTime(task.date, task.start)) / 60000;
                    if (durationMins < 60) {
                        timeRange = `${task.start} - ${task.end}`;
                    } else {
                        timeRange = `${task.start}`;
                    }
                }

                // Render Day Divider
                if (task.date !== lastDate) {
                    const dayLabel = task.date === "2026-05-23" ? "5月23日 (星期六) 前哨戰" : "5月24日 (星期日) 大婚正日";
                    container.insertAdjacentHTML('beforeend', `
                        <div class="pt-2 pb-1 first:pt-0">
                            <span class="bg-rose-950 text-white text-[10px] font-black px-2.5 py-1 rounded-full uppercase tracking-wider shadow-sm">
                                ${dayLabel}
                            </span>
                        </div>
                    `);
                    lastDate = task.date;
                }

                const cardHtml = `
                    <div class="task-card bg-white rounded-xl p-3.5 shadow-sm border border-slate-200 transition-all duration-300 relative" 
                         data-date="${task.date}"
                         data-start="${task.start}" 
                         data-end="${task.end}"
                         id="task-idx-${idx}">
                        <div class="absolute -left-6 top-4 w-4 h-0.5 bg-rose-100"></div>
                        <div class="flex items-start gap-2.5">
                            <div class="flex-1">
                                <div class="flex justify-between items-start gap-2">
                                    <span class="task-title font-bold text-sm text-slate-800 leading-snug">${task.title}</span>
                                    <span class="time-badge shrink-0 text-[10px] font-extrabold px-2 py-0.5 rounded bg-slate-100 text-slate-600 transition-colors">${timeRange}</span>
                                </div>
                                <p class="text-xs text-slate-500 mt-1 leading-relaxed">${task.desc}</p>
                                ${tagEl ? `<div class="mt-2 flex flex-wrap gap-1">${tagEl}</div>` : ''}
                                ${matEl}
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        // HKT Real-time ticking engine
        function tick() {
            const realNow = new Date().getTime();
            const now = realNow + debugTimeOffset;
            
            const hkTimeString = timeFormatter.format(new Date(now));
            const hkDateString = dateFormatter.format(new Date(now));
            
            // 1. Digital Clock
            if (isDebugMode) {
                document.getElementById('live-clock').innerHTML = `<span class="text-rose-500">${hkTimeString}</span>`;
                document.getElementById('clock-label').innerText = `模擬香港時間 (${hkDateString})`;
            } else {
                document.getElementById('live-clock').innerText = hkTimeString;
                document.getElementById('clock-label').innerText = `當前香港時間 (${hkDateString})`;
            }

            // 2. Real-time Progress Bar
            let percentage = 0;
            if (now >= END_TIME) {
                percentage = 100;
            } else if (now > START_TIME && now < END_TIME) {
                percentage = ((now - START_TIME) / (END_TIME - START_TIME)) * 100;
            }
            document.getElementById('progress-percentage').innerText = `${Math.floor(percentage)}%`;
            document.getElementById('time-progress-bar').style.width = `${percentage}%`;

            // 3. Auto Highlighting System
            let activeTaskFound = false;
            let currentTaskName = "";
            
            const textClassActive = 'text-white';
            const bgClassActive = 'bg-rose-500';
            
            const taskCards = document.querySelectorAll('.task-card');
            taskCards.forEach(card => {
                const dateStr = card.dataset.date;
                const start = parseTaskTime(dateStr, card.dataset.start);
                const end = parseTaskTime(dateStr, card.dataset.end);
                const timeBadge = card.querySelector('.time-badge');

                // Clear previous active states
                card.classList.remove('task-active');
                timeBadge.classList.remove('bg-rose-500', 'text-white');
                timeBadge.classList.add('bg-slate-100', 'text-slate-600');

                if (now >= start && now < end) {
                    card.classList.add('task-active');
                    timeBadge.classList.remove('bg-slate-100', 'text-slate-600');
                    timeBadge.classList.add(bgClassActive, textClassActive);
                    activeTaskFound = true;
                    currentTaskName = card.querySelector('.task-title').innerText;
                }
            });

            // 4. Update Status Indicator Panel
            const activeDot = document.getElementById('active-dot');
            const activePing = document.getElementById('active-ping');
            const statusText = document.getElementById('current-task-status');

            if (now < START_TIME) {
                activeDot.className = "relative inline-flex rounded-full h-3 w-3 bg-slate-300";
                activePing.classList.add('hidden');
                statusText.innerText = "等待大日子降臨...";
                statusText.className = "text-xs font-bold text-slate-400";
            } else if (now >= END_TIME) {
                activeDot.className = "relative inline-flex rounded-full h-3 w-3 bg-emerald-500";
                activePing.classList.add('hidden');
                statusText.innerText = "今日作戰順利，辛苦晒！";
                statusText.className = "text-xs font-bold text-emerald-600";
            } else if (activeTaskFound) {
                activeDot.className = `relative inline-flex rounded-full h-3 w-3 bg-rose-600`;
                activePing.className = `animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75`;
                activePing.classList.remove('hidden');
                
                statusText.innerText = currentTaskName;
                statusText.className = `text-xs font-black text-rose-600 truncate max-w-[180px] text-right`;
            } else {
                activeDot.className = "relative inline-flex rounded-full h-3 w-3 bg-blue-400";
                activePing.classList.add('hidden');
                statusText.innerText = "緩衝 / 待命中";
                statusText.className = "text-xs font-bold text-blue-600";
            }
        }

        // Debug simulator (3x click hidden helper)
        let clickCount = 0;
        let clickTimer;
        document.getElementById('app-title').addEventListener('click', () => {
            clickCount++;
            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 1000);
            
            if (clickCount === 3) {
                clickCount = 0;
                const simulateTime = prompt("【跨日除錯模式】請輸入你想模擬的日期與時間。\n格式: MM-DD HH:MM (例如 05-23 21:15 或 05-24 16:30)\n輸入空白或取消即可還原真實時間:", "05-24 16:30");
                if (simulateTime && simulateTime.includes(' ') && simulateTime.includes(':')) {
                    const [datePart, timePart] = simulateTime.split(' ');
                    const fullDateStr = `2026-${datePart}`;
                    const targetTimestamp = parseTaskTime(fullDateStr, timePart);
                    debugTimeOffset = targetTimestamp - new Date().getTime();
                    isDebugMode = true;
                    tick();
                    alert(`已成功模擬至 ${fullDateStr} ${timePart}`);
                } else {
                    debugTimeOffset = 0;
                    isDebugMode = false;
                    tick();
                    alert("已關閉模擬，恢復當前真實時間。");
                }
            }
        });

        // Bootstrap on load
        window.addEventListener('DOMContentLoaded', () => {
            switchCrew(currentCrew);
            setInterval(tick, 1000);
        });
    </script>
</body>
</html>

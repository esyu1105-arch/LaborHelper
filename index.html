        body {

        .custom-scrollbar::-webkit-scrollbar {
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;

        /* Real-time active highlighted task card */
        .task-active {
            border-color: #e11d48 !important; /* rose-600 */

                    { start: "14:05", end: "15:00", title: "Zone A 準備出發", desc: "於嫲嫲屋企準備轉場，協助確認現場狀況並引導人員上車。" },
                    { start: "16:00", end: "17:00", title: "指揮迎賓、麻雀房設置 & 餐飲協調", desc: "全局控時。指揮迎賓 Set-up (先借屏風遮海味櫃等)。設置 6-8 張麻雀枱。確認 18:00 中式小食安排。", tag: "現場指揮" },
                    { start: "17:00", end: "18:15", title: "安排賓客入座", desc: "與 Willson 負責主動引導並安排抵達的賓客入座。" },
                    { start: "18:15", end: "18:30", title: "證婚後迎賓區調整", desc: "指揮場地工作人員移走屏風，完成證婚後的迎賓區佈置重整。" },
                    { start: "18:30", end: "18:45", title: "監督第一輪中式小食", desc: "監督第一輪中式小食（共 15 打）準時新鮮供應賓客。" },
                    { start: "18:45", end: "19:15", title: "Reception Standby 迎賓", desc: "於 Reception 當值招呼來賓。" },
                    { start: "19:15", end: "19:30", title: "支援女家簽到", desc: "視乎現場女家簽到人手狀況，主動協助女家賓客。" },
                    { start: "19:30", end: "20:30", title: "維持接待處運作", desc: "維持 Reception 工作，直到 20:30 首道菜上桌後入席。" },
                    { start: "22:45", end: "23:05", title: "現場指示 & 送客引導", desc: "送客時提供引導，引導賓客前往接駁車位置。" },
                    { start: "23:05", end: "23:15", title: "監管鏈 A：金器收集", desc: "【最高機密】與春、細佬共同收集劉媽媽的金器與人情袋，確保資產安全。", tag: "高風險任務", urgent: true }
                ]
            },
            willson: {
                name: "Willson",
                title: "後勤支援、場地清場與入座安排",
                color: "indigo",
                tips: [
                    "你是晚宴主要的「入座指揮」，需事先熟悉座位表（Seating Plan）以引導賓客快速就座。",
                    "全日多次搬運大型及重型物資，務必穿著便於活動的舒適鞋子。"
                ],
                timeline: [
                    { start: "09:00", end: "10:55", title: "行李搬運上車", desc: "協助將個人行李及新人行李搬運至花車。" },
                    { start: "10:55", end: "11:15", title: "酒店房清場", desc: "與春雨進行出門房清場。注意：只需清除新人佈置，酒店自帶物資不動。", tag: "清場專家" },
                    { start: "11:15", end: "12:00", title: "協助物資搬運出發", desc: "協助搬運相關物資下樓上車，隨後向順風圍出發。" },
                    { start: "12:00", end: "13:00", title: "「醫肚團隊」午餐安排", desc: "處理或享用順風圍工作人員午餐。" },
                    { start: "13:00", end: "14:10", title: "清理拜神裝飾 & 休息", desc: "清理現場裝飾物資，隨後進行休息。" },
                    { start: "14:10", end: "15:00", title: "物資搬運上接駁車", desc: "將拜神儀式所有自帶物資搬上 27座接駁車。" },
                    { start: "15:00", end: "16:00", title: "M+ 物資進場 & 紅圈移除確認", desc: "抵達 M+，全員搬運物資進「璞」。與春雨確認紅圈標示裝飾是否已確實移除。", tag: "細節核對" },
                    { start: "16:00", end: "17:00", title: "證婚位置 Set-up", desc: "與細佬在 Amy 指揮下進行證婚位置佈置與設置。" },
                    { start: "17:00", end: "18:15", title: "安排賓客入座", desc: "與丁丁共同負責帶領並安排抵達的證婚來賓入座。" },
                    { start: "18:15", end: "18:30", title: "搬運布藝 Backdrop", desc: "證婚後，與細佬將大型布藝 Backdrop 搬至迎賓位置並調整闊度。", tag: "重力擔當" },
                    { start: "18:45", end: "19:30", title: "引導晚宴賓客入座", desc: "在晚宴迎賓期間，手持座位表負責精準引導賓客入座。", tag: "入座大腦" },
                    { start: "19:30", end: "20:00", title: "維持入座安排運作", desc: "與 Wing 共同在入口處引導遲到或有特殊調整的賓客入座。" },
                    { start: "20:30", end: "22:45", title: "入座任務完成", desc: "入座引導結束，可準備入席享用晚宴，期間待命支援。" },
                    { start: "22:45", end: "23:15", title: "現場指示 & 送客引導", desc: "提供現場指示，引導賓客離場並指引前往接駁車。" },
                    { start: "23:15", end: "23:30", title: "終極撤退：物資上花車", desc: "Gentlemen 組全員動身，將現場剩餘自攜物資全部搬到花車上。" }
                ]
            }
        };

        // Standard timing parameters
        const WEDDING_DATE_STRING = "2026-05-24";
        const START_TIME = new Date(`${WEDDING_DATE_STRING}T06:45:00+08:00`).getTime();
        const END_TIME = new Date(`${WEDDING_DATE_STRING}T23:30:00+08:00`).getTime();
        
        let currentCrew = localStorage.getItem('last_active_crew') || 'chun';
        let debugTimeOffset = 0;
        let isDebugMode = false;
        
        // HKT Formatter
        const timeFormatter = new Intl.DateTimeFormat('en-US', {
            timeZone: 'Asia/Hong_Kong',
            hour12: false,
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });

        const dateFormatter = new Intl.DateTimeFormat('en-US', {
            timeZone: 'Asia/Hong_Kong',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit'
        });

        function parseTaskTime(timeString) {
            return new Date(`${WEDDING_DATE_STRING}T${timeString}:00+08:00`).getTime();
        }

        // Switch Active Crew Profile
        window.switchCrew = function(crewKey) {
            currentCrew = crewKey;
            localStorage.setItem('last_active_crew', crewKey);
            
            // Toggle Button Styling
            document.querySelectorAll('.crew-btn').forEach(btn => {
                btn.className = "crew-btn shrink-0 px-4 py-2.5 text-xs font-black rounded-xl transition-all snap-start shadow-sm border bg-white text-slate-600 border-slate-200 hover:bg-slate-50";
            });
            
            const activeBtn = document.getElementById(`crew-${crewKey}`);
            const isRose = CREW_DATA[crewKey].color === 'rose';
            
            if (isRose) {
                activeBtn.className = "crew-btn shrink-0 px-4 py-2.5 text-xs font-black rounded-xl transition-all snap-start shadow-sm border bg-rose-600 text-white border-rose-600";
            } else {
                activeBtn.className = "crew-btn shrink-0 px-4 py-2.5 text-xs font-black rounded-xl transition-all snap-start shadow-sm border bg-indigo-600 text-white border-indigo-600";
            }

            renderTimeline();
            tick(); // Instant update
        }

        // Dynamic HTML Timeline Card Builder
        function renderTimeline() {
            const container = document.getElementById('timeline-container');
            container.innerHTML = "";
            
            const data = CREW_DATA[currentCrew];
            
            data.timeline.forEach((task, idx) => {
                const isUrgent = task.urgent;
                const borderClass = isUrgent ? 'border-rose-300 bg-rose-50/30' : 'border-slate-200 bg-white';
                const tagEl = task.tag ? `<span class="text-[10px] bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full font-medium">${task.tag}</span>` : '';
                
                let timeRange = task.start;
                if (task.end && task.start !== task.end) {
                    const durationMins = (parseTaskTime(task.end) - parseTaskTime(task.start)) / 60000;
                    if (durationMins < 60) {
                        timeRange = `${task.start} - ${task.end}`;
                    } else {
                        timeRange = `${task.start}`;
                    }
                }

                const cardHtml = `
                    <div class="task-card bg-white rounded-xl p-3.5 shadow-sm border transition-all duration-300 relative" 
                         data-start="${task.start}" 
                         data-end="${task.end}"
                         id="task-idx-${idx}">
                        <div class="absolute -left-6 top-4 w-4 h-0.5 bg-rose-100"></div>
                        <div class="flex items-start gap-2.5">
                            <div class="flex-1">
                                <div class="flex justify-between items-start gap-2">
                                    <span class="task-title font-bold text-sm text-slate-800 leading-snug">${task.title}</span>
                                    <span class="time-badge shrink-0 text-[10px] font-extrabold px-2 py-0.5 rounded bg-slate-100 text-slate-600 transition-colors">${timeRange}</span>
                                </div>
                                <p class="text-xs text-slate-500 mt-1 leading-relaxed">${task.desc}</p>
                                ${tagEl ? `<div class="mt-2 flex flex-wrap gap-1">${tagEl}</div>` : ''}
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        // HKT Real-time ticking engine
        function tick() {
            const realNow = new Date().getTime();
            const now = realNow + debugTimeOffset;
            
            const hkTimeString = timeFormatter.format(new Date(now));
            const hkDateString = dateFormatter.format(new Date(now));
            
            const isWeddingDay = hkDateString === "05/24/2026";
            
            // 1. Digital Clock
            if (isDebugMode) {
                document.getElementById('live-clock').innerHTML = `<span class="text-rose-500">${hkTimeString}</span>`;
            } else {
                document.getElementById('live-clock').innerText = hkTimeString;
            }

            // 2. Real-time Progress Bar
            let percentage = 0;
            if (now >= END_TIME) {
                percentage = 100;
            } else if (now > START_TIME && now < END_TIME) {
                percentage = ((now - START_TIME) / (END_TIME - START_TIME)) * 100;
            }
            document.getElementById('progress-percentage').innerText = `${Math.floor(percentage)}%`;
            document.getElementById('time-progress-bar').style.width = `${percentage}%`;

            // 3. Auto Highlighting System
            let activeTaskFound = false;
            let currentTaskName = "";
            
            const activeCrewColor = CREW_DATA[currentCrew].color;
            const bgClassActive = activeCrewColor === 'rose' ? 'bg-rose-500' : 'bg-indigo-600';
            const borderClassActive = activeCrewColor === 'rose' ? 'border-rose-500' : 'border-indigo-500';
            const textClassActive = 'text-white';
            
            const taskCards = document.querySelectorAll('.task-card');
            taskCards.forEach(card => {
                const start = parseTaskTime(card.dataset.start);
                const end = parseTaskTime(card.dataset.end);
                const timeBadge = card.querySelector('.time-badge');

                // Clear previous active states
                card.classList.remove('task-active');
                timeBadge.classList.remove('bg-rose-500', 'bg-indigo-600', 'text-white');
                timeBadge.classList.add('bg-slate-100', 'text-slate-600');

                if (isWeddingDay || isDebugMode) {
                    if (now >= start && now < end) {
                        card.classList.add('task-active');
                        // Inject active style overrides depending on crew color
                        timeBadge.classList.remove('bg-slate-100', 'text-slate-600');
                        timeBadge.classList.add(bgClassActive, textClassActive);
                        activeTaskFound = true;
                        currentTaskName = card.querySelector('.task-title').innerText;
                    }
                }
            });

            // 4. Update Status Indicator Panel
            const activeDot = document.getElementById('active-dot');
            const activePing = document.getElementById('active-ping');
            const statusText = document.getElementById('current-task-status');

            if (!isWeddingDay && !isDebugMode) {
                activeDot.className = "relative inline-flex rounded-full h-3 w-3 bg-slate-300";
                activePing.classList.add('hidden');
                statusText.innerText = "等待大日子降臨...";
                statusText.className = "text-xs font-bold text-slate-400";
            } else if (now < START_TIME) {
                activeDot.className = "relative inline-flex rounded-full h-3 w-3 bg-amber-400";
                activePing.classList.add('hidden');
                statusText.innerText = "準備出發";
                statusText.className = "text-xs font-bold text-amber-600";
            } else if (now >= END_TIME) {
                activeDot.className = "relative inline-flex rounded-full h-3 w-3 bg-emerald-500";
                activePing.classList.add('hidden');
                statusText.innerText = "今日作戰順利，辛苦晒！";
                statusText.className = "text-xs font-bold text-emerald-600";
            } else if (activeTaskFound) {
                const dotColor = activeCrewColor === 'rose' ? 'bg-rose-600' : 'bg-indigo-600';
                activeDot.className = `relative inline-flex rounded-full h-3 w-3 ${dotColor}`;
                activePing.className = `animate-ping absolute inline-flex h-full w-full rounded-full ${activeCrewColor === 'rose' ? 'bg-rose-400' : 'bg-indigo-400'} opacity-75`;
                activePing.classList.remove('hidden');
                
                statusText.innerText = currentTaskName;
                statusText.className = `text-xs font-black ${activeCrewColor === 'rose' ? 'text-rose-600' : 'text-indigo-600'} truncate max-w-[180px] text-right`;
            } else {
                activeDot.className = "relative inline-flex rounded-full h-3 w-3 bg-blue-400";
                activePing.classList.add('hidden');
                statusText.innerText = "緩衝 / 待命中";
                statusText.className = "text-xs font-bold text-blue-600";
            }
        }

        // Debug simulator (3x click hidden helper)
        let clickCount = 0;
        let clickTimer;
        document.getElementById('app-title').addEventListener('click', () => {
            clickCount++;
            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => { clickCount = 0; }, 1000);
            
            if (clickCount === 3) {
                clickCount = 0;
                const simulateTime = prompt("【除錯模式】輸入你想模擬嘅婚禮時間 (例如 09:30, 16:30, 22:45)\n取消可關閉除錯模式並重回真實時間:", "16:30");
                if (simulateTime && simulateTime.includes(':')) {
                    const targetTimestamp = parseTaskTime(simulateTime);
                    debugTimeOffset = targetTimestamp - new Date().getTime();
                    isDebugMode = true;
                    tick();
                    alert(`已將時間模擬至 ${simulateTime}`);
                } else {
                    debugTimeOffset = 0;
                    isDebugMode = false;
                    alert("除錯模式已關閉，恢復真實時間。");
                }
            }
        });

        // Bootstrap on load
        window.addEventListener('DOMContentLoaded', () => {
            switchCrew(currentCrew);
            setInterval(tick, 1000);
        });
    </script>
</body>
</html>
